<!DOCTYPE html>
<html lang="en">
	@@include('html/_head.htm',{
	"title":"Карточка товара"
	})
	<body>
		<div class="wrapper">
			@@include('html/_header.htm',{})
			<main class="page page_inner">
				<div class="page__header">
					<div class="page__container">
						<h1 class="page__title title">Разделочные ножи</h1>
				        <nav class="page__breadcrumbs breadcrumbs">
				        	<ul class="breadcrumbs__list">
				        		<li class="breadcrumbs__item">
				        			<a href="" class="breadcrumbs__link">Главная</a>
				        		</li>
				        		<li class="breadcrumbs__item">
                                    <a href="" class="breadcrumbs__link">Разделочные ножи</a>
				        		</li>
                                <li class="breadcrumbs__item">
				        			<span class="breadcrumbs__current">Нож Снегирь</span>
				        		</li>
				        	</ul>
				        </nav>
					</div>
				</div>
                <div class="product">
                    <div class="product__container">
                        <div class="product__main main-product">
                            <div class="main-product__images images-product">
                                <div class="images-product__slider swiper">
                                    <div class="images-product__wrapper swiper-wrapper">
                                        <div class="images-product__slide swiper-slide">
											<img class="ibg" src="@img/product/01.jpg" alt="Image">
										</div>
										<div class="images-product__slide swiper-slide">
											<img class="ibg" src="@img/product/02.jpg" alt="Image">
										</div>
										<div class="images-product__slide swiper-slide">
											<img class="ibg" src="@img/product/03.jpg" alt="Image">
										</div>
										<div class="images-product__slide swiper-slide">
											<img class="ibg" src="@img/product/04.jpg" alt="Image">
										</div>
										<div class="images-product__slide swiper-slide">
											<img class="ibg" src="@img/product/05.jpg" alt="Image">
										</div>
                                    </div>
                                </div>
                                <div class="images-product__thumbs thumbs-images">
                                    <div class="thumbs-images__wrapper swiper-wrapper">
										<div class="thumbs-images__slide swiper-slide">
											<img class="ibg" src="@img/product/02.jpg" alt="Image">
										</div>
										<div class="thumbs-images__slide swiper-slide">
											<img class="ibg" src="@img/product/03.jpg" alt="Image">
										</div>
										<div class="thumbs-images__slide swiper-slide">
											<img class="ibg" src="@img/product/04.jpg" alt="Image">
										</div>
										<div class="thumbs-images__slide swiper-slide">
											<img class="ibg" src="@img/product/05.jpg" alt="Image">
										</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
			</main>
			@@include('html/_footer.htm',{})
		</div>
		@@include('html/_popup.htm',{})
		@@include('html/_js.htm',{})
	</body>
</html>
